[package]
name = "frontend"
version = "0.1.0"
edition = "2021"
authors = ["Sean Myers <spmyers@protonmail.com>"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Logging
console_error_panic_hook = "0.1.7"
console_log = "0.2.0"
# Minimal HTTP client for both native and WASM
ehttp = "0.2.0"
# Raw bindings to JS global APIs for projects using wasm-bindgen
js-sys = "0.3.57"
# Logging
log = "0.4.17"
# Serialization/deserialization
serde = { version = "1.0.137", features = ["derive"] }
serde_json = "1.0.81"
# Frontend WebAssembly library
sycamore = { version = "0.7.1", features = ["experimental-hydrate", "futures"] }
sycamore-router = { version = "0.7.1" }
# Time
time = { version = "0.2.7", features = ["serde", "std"] }
# Implementation of Universally Unique Identifiers (Uuid) - DOES NOT COMPILE CURRENTLY
# uuid = { version = "1.1.0", features = ["v4", "serde"] }
wasm-bindgen = "0.2.80"
web-sys = { version = "0.3.58", features = ["HtmlInputElement", "InputEvent"] }
