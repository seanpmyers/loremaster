[package]
name = "loremaster"
version = "0.1.0"
authors = ["Sean Myers <spmyers@protonmail.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Error handling
anyhow = "1.0.58"
# Password Encryption
argon2 = "0.4.1"
# Minimal HTTP client for both native and WASM
ehttp = "0.2.0"
# Logging
env_logger = "0.9.0"
frontend = { path = "./frontend" }
# Provides async programming foundational functionality
futures = "0.3.21"
# Logging
log = "0.4.17"
# Random nubmer generation
rand = "0.8.5"
# Backend web framework
rocket = { version = "0.5.0-rc.2", features = [
	"secrets",
	"json",
	"tls",
	"uuid",
] }
# Serialization
serde = { version = "1.0.137", features = ["derive"] }
serde_json = "1.0.82"
# Database client/pool/toolkit
sqlx = { version = "0.6.0", features = [
	"json",
	"macros",
	"migrate",
	# "offline",
	"postgres",
	"runtime-tokio-native-tls",
	"time",
	"tls",
	"uuid",
] }
# Frontend WebAssembly library
sycamore = { version = "0.7.1", features = ["ssr"] }
# Error/exception handling
thiserror = "1.0.31"
# Time
time = { version = "0.3.11", features = ["serde", "std"] }
# Backend async I/O functionality
tokio = { version = "1.19.2", features = ["full"] }
tokio-stream = "0.1.9"
tokio-test = "0.4.2"
# Encode/decode TOML content/files
toml = "0.5.9"
# Implementation of Universally Unique Identifiers (Uuid)
uuid = { version = "1.1.2", features = ["v4", "serde"] }

web-sys = { version = "0.3.58" }

[workspace]
members = ["frontend"]
